<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exemplo Simples</title>
</head>
<body>
    <header>
        <h1>Bem-vindo ao Exemplo Simples</h1>
    </header>
    <main>
        <p>Este é um exemplo básico de HTML com algumas tags comuns.</p>
        <ul>
            <li>Tag de título: <code>&lt;h1&gt;</code></li>
            <li>Tag de parágrafo: <code>&lt;p&gt;</code></li>
            <li>Tag de lista: <code>&lt;ul&gt;</code> e <code>&lt;li&gt;</code></li>
        </ul>
    </main>
    <footer>
        <p>&copy; 2026 Exemplo Simples</p>
    </footer>
</body>
</html>
