<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>

    <style>
        /* Seletor de elemento */
        p {
            color: red;
        }

        /* Seletor de classe */
        .azul {
            color: blue;
        }

        /* Seletor de ID */
        #vermelho {
            color: red;
        }
    </style>
</head>
<body>
    <p>Parágrafo 1</p>
    <p class="azul">Parágrafo 2</p>
    <p id="vermelho">Parágrafo 3</p>
</body>
</html>
