<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>

    <style>
        body{
            display: flex;
            flex-direction: column;
            margin: 0 auto;
            align-items: center;
            justify-content: center;
        }
        header{
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }
        nav ul {
            display: flex;
            gap: 1rem;
            align-items: center;
            justify-content: center;
        }
        nav ul li {
            list-style: none;
        }
        nav ul li a {
            text-decoration: none;
            color: black;
            padding: 10px 20px;
            box-shadow: 5px 5px 10px rgba(0, 0, 0, 0.1);
            border-radius: 20px;
            transition: all0.3s ease;
        }
        nav ul li a:hover {
            background-color: black;
            transform: matrix(2, 0, 0, 2, 0, 0) rotate(10deg);
            color: white;
        }
    </style>
</head>
<body>
    <header>
        <h1>Navegação</h1>

        <nav>
            <ul>
                <li><a href="#">Home</a></li>
                <li><a href="#">Sobre</a></li>
                <li><a href="#">Contato</a></li>
            </ul>
        </nav>
    </header>
</body>
</html>
